<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>학교 상세 · AI 석사논문 인텔리전스</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet" />
<link rel="stylesheet" href="assets/style.css" />
</head>
<body>

<header class="site-header">
  <div class="container header-inner">
    <a href="index.html" class="brand">
      <span class="brand-mark">AI</span>
      <span class="brand-text">
        <span class="brand-title">석사논문 인텔리전스</span>
        <span class="brand-sub">17 SCHOOLS · 4,620 THESES</span>
      </span>
    </a>
    <nav>
      <ul class="nav-list">
        <li><a href="index.html">개요</a></li>
        <li><a href="schools.html" class="active">학교별</a></li>
        <li><a href="recommendations.html">추천 논문</a></li>
      </ul>
    </nav>
  </div>
</header>

<section class="hero" style="padding: 3rem 0 2rem;">
  <div class="hero-inner">
    <div class="hero-eyebrow" id="school-type">School Profile</div>
    <h1 class="hero-title" id="school-name">…</h1>
    <p class="hero-subtitle" id="school-note">…</p>
    <div class="hero-meta">
      <span>학과: <strong id="school-depts">·</strong></span>
      <span>·</span>
      <span>총 <strong id="school-count">·</strong>건</span>
    </div>
  </div>
</section>

<main>
<section class="section">
  <div class="container">
    <div id="school-tags-row" style="margin-bottom: 2rem;"></div>
  </div>
</section>
</main>

<footer class="site-footer">
  <div class="container footer-inner">
    <div class="footer-meta">
      <strong>AI Thesis Intelligence Dashboard</strong><br>
      작성자: 최경찬 · 📧 <a href="mailto:repairer5812@gmail.com">repairer5812@gmail.com</a> · 📱 <a href="tel:+821028753705">010-2875-3705</a>
    </div>
    <div class="footer-credit">Built with Claude Code</div>
  </div>
</footer>

<script src="assets/data.js"></script>
<script src="assets/cards.js"></script>
<script>
const params = new URLSearchParams(location.search);
const id = params.get('id');
const school = SCHOOLS.find(s => s.id === id) || SCHOOLS[0];

document.getElementById('school-name').textContent = school.name;
document.getElementById('school-type').textContent = school.type.toUpperCase();
document.getElementById('school-note').textContent = school.note;
document.getElementById('school-depts').innerHTML = renderSchoolDepts(school);
document.getElementById('school-count').textContent = school.totalCount;
document.title = school.name + ' · AI 석사논문 인텔리전스';

document.getElementById('school-tags-row').innerHTML = `
  <div class="school-tags" style="display:flex; gap:0.4rem; flex-wrap:wrap;">
    ${school.tags.map(t => `<span class="school-tag" style="font-size:0.85rem; padding:0.4rem 0.8rem;">${t}</span>`).join('')}
  </div>
`;

// 추천 논문 (이 학교 것만)
const recsHere = RECOMMENDATIONS.filter(r => r.schoolId === school.id);
if (recsHere.length > 0) {
  const main = document.querySelector('main .container');
  main.insertAdjacentHTML('beforeend', `
    <section style="margin-top:1rem;">
      <header class="section-head">
        <div class="section-eyebrow">Top Picks</div>
        <h2 class="section-title">${school.name} 추천 논문 ${recsHere.length}편</h2>
      </header>
      <div class="rec-grid" id="school-recs"></div>
    </section>
  `);
  renderRecGrid(recsHere, 'school-recs', { schoolColor: school.color });
}
</script>
</body>
</html>
