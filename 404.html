<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>404 · AI 석사논문 인텔리전스</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet" />
<link rel="stylesheet" href="/assets/style.css" />
<style>
  body { display:flex; flex-direction:column; min-height:100vh; }
  main { flex:1; display:flex; align-items:center; justify-content:center; }
  .err-box { text-align:center; padding:3rem; }
  .err-num { font-size:6rem; font-weight:800; color:var(--color-accent); line-height:1; letter-spacing:-0.05em; }
  .err-msg { font-size:1.5rem; font-weight:700; margin:1rem 0 0.5rem; }
  .err-desc { color:var(--color-text-muted); margin-bottom:2rem; }
</style>
</head>
<body>
<header class="site-header">
  <div class="container header-inner">
    <a href="/" class="brand">
      <span class="brand-mark">AI</span>
      <span class="brand-text">
        <span class="brand-title">석사논문 인텔리전스</span>
        <span class="brand-sub">17 SCHOOLS · 4,620 THESES</span>
      </span>
    </a>
  </div>
</header>
<main>
  <div class="err-box">
    <div class="err-num">404</div>
    <div class="err-msg">페이지를 찾을 수 없습니다</div>
    <div class="err-desc">요청하신 보고서나 학교 페이지가 없습니다. URL을 확인해주세요.</div>
    <a href="/" class="btn btn-primary">메인으로 돌아가기</a>
  </div>
</main>
</body>
</html>
