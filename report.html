<section class="section">

    </div>

<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.11/dist/purify.min.js"></script>
<script>
const params = new URLSearchParams(location.search);
const file = params.get('file') || '00_최종_종합보고서.md';
const url = 'reports/' + file;

document.getElementById('raw-link').href = url;

fetch(url)
  .then(r => {
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.text();
  })
  .then(md => {
    marked.setOptions({ breaks: false, gfm: true });
    const html = marked.parse(md);
    document.getElementById('content').innerHTML = DOMPurify.sanitize(html, { ADD_ATTR: ['target'] });
    // Title from first H1
    const h1 = document.querySelector('#content h1');
    if (h1) document.title = h1.textContent + ' · AI 석사논문 인텔리전스';
  })
  .catch(err => {
    document.getElementById('content').innerHTML = `
      <h1>로드 실패</h1>
      <p>${file} 파일을 불러올 수 없습니다.</p>
      <pre>${err}</pre>
      <p>로컬 환경에서는 file:// 프로토콜로 fetch가 막혀 있어서 발생할 수 있습니다. <strong>GitHub Pages 또는 로컬 서버(<code>python -m http.server</code>)에서 실행하세요.</strong></p>
    `;
  });
</script>

</body>
</html>
